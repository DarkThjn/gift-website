<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>


<body>

<div id="hearts"></div>

<!-- LOCKSCREEN -->

<div id="lockscreen">

<img id="avatar" src="assets/avatar/avatar.jpg">

<h2>Enter Passcode</h2>

<div id="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div id="keypad"></div>

</div>


<!-- MAIN MENU -->

<div id="menu" class="hidden">

<div class="card" onclick="openMusic()">🎵 Music</div>
<div class="card" onclick="openLetter()">💌 Letter</div>
<div class="card" onclick="openGallery()">🖼 Gallery</div>
<div class="card" onclick="openGift()">🎁 Gift</div>

</div>


<!-- LETTER -->

<div id="letterModal" class="modal">

<div class="modalBox">

<button onclick="closeModal()">X</button>

<h2>For You</h2>

<p id="letterText"></p>

</div>

</div>


<!-- GALLERY -->

<div id="galleryModal" class="modal">

<div class="modalBox">

<button onclick="closeModal()">X</button>

<div id="galleryGrid"></div>

</div>

</div>


<!-- MUSIC -->

<div id="musicModal" class="modal">

<div class="modalBox">

<button onclick="closeModal()">X</button>

<h3 id="songTitle"></h3>

<button onclick="prevSong()">Prev</button>
<button onclick="playSong()">Play</button>
<button onclick="pauseSong()">Pause</button>
<button onclick="nextSong()">Next</button>

</div>

</div>


<!-- GIFT -->

<div id="giftScene" class="modal">

<div class="modalBox">

<button onclick="closeModal()">X</button>

<div class="giftContainer">

<div class="giftBox" onclick="openGiftBox()">

<div class="lid"></div>
<div class="box"></div>

</div>

</div>

<div id="giftPhotos"></div>

</div>

</div>


<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
